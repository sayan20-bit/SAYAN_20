<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAYAN ESPORTS ANALYZER SYSTEM</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
    font-family:Arial;
    background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    color:white;
    padding:20px;
}

.box{
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:20px;
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    color:#00d2ff;
}

input, button{
    display:block;
    margin:15px auto;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button{
    background:#00d2ff;
    color:black;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #333;
}

th{
    background:#00d2ff;
    color:black;
}

.mvp{
    background:rgba(255,215,0,0.1);
    color:gold;
    font-weight:bold;
}

.team{
    color:#aaa;
    font-size:12px;
}

.badge{
    background:#ff0055;
    padding:3px 8px;
    border-radius:5px;
}

.section{
    margin-top:40px;
}

#chartBox{
    margin-top:30px;
    background:#111;
    padding:15px;
    border-radius:15px;
}
</style>
</head>

<body>

<div class="box">

<h1>🔥 SAYAN ESPORTS ANALYZER</h1>

<input type="file" id="files" multiple>

<!-- 🔽 زر التحميل Excel -->
<button onclick="downloadExcel()">⬇️ Download Excel</button>

<div class="section">
<h2>🏆 TEAMS</h2>
<table>
<thead>
<tr>
<th>Rank</th>
<th>Team</th>
<th>Kills</th>
<th>Points</th>
<th>BOOYAH</th>
</tr>
</thead>
<tbody id="teams"></tbody>
</table>
</div>

<div class="section">
<h2>👤 PLAYERS</h2>
<table>
<thead>
<tr>
<th>Rank</th>
<th>Name</th>
<th>Team</th>
<th>Kills</th>
<th>Damage</th>
<th>Status</th>
</tr>
</thead>
<tbody id="players"></tbody>
</table>
</div>

<div id="chartBox">
<canvas id="chart"></canvas>
</div>

</div>

<script>

/* 🔒 PROTECTION SYSTEM */
document.addEventListener("contextmenu", e => e.preventDefault());

let stats = {};
let teams = {};

/* FILE INPUT */
document.getElementById('files').addEventListener('change', function(e){

    const files = e.target.files;
    stats = {};
    teams = {};

    let done = 0;

    Array.from(files).forEach(file=>{
        const reader = new FileReader();

        reader.onload = function(){
            parse(reader.result);
            done++;

            if(done === files.length){
                render();
            }
        };

        reader.readAsText(file);
    });
});

/* POINTS */
function getPoints(rank){
    return {1:12,2:9,3:8,4:7,5:6,6:5,7:4,8:3,9:2,10:1}[rank] || 0;
}

/* PARSE */
function parse(text){

    let currentTeam = "Unknown";
    let lines = text.split("\n");

    lines.forEach(line=>{

        let teamMatch = line.match(/TeamName:\s*(.*?)(Rank|$)/i);
        if(teamMatch) currentTeam = teamMatch[1].trim();

        let teamScore = line.match(/TeamName:\s*(.*?)\s+Rank:\s*(\d+)\s+KillScore:\s*(\d+)/);

        if(teamScore){
            let name = teamScore[1];
            let rank = +teamScore[2];
            let kills = +teamScore[3];

            if(!teams[name]) teams[name]={k:0,p:0,t:0,b:0};

            teams[name].k += kills;
            teams[name].p += getPoints(rank);
            teams[name].t += kills + getPoints(rank);

            if(rank === 1) teams[name].b++;
        }

        let playerMatch = line.match(/NAME:\s*(.*?)\s+ID:\s*(\d+)\s+KILL:\s*(\d+)/i);

        if (playerMatch) {

            let name = playerMatch[1];
            let id = playerMatch[2];
            let kills = parseInt(playerMatch[3]);

            if (!stats[id]) {
                stats[id] = {
                    id,
                    name,
                    team: currentTeam,
                    kills: 0,
                    damage: 0
                };
            }

            stats[id].kills += kills;
            stats[id].damage += kills * 200;
        }

    });

}

/* RENDER */
function render(){
    renderPlayers();
    renderTeams();
    renderChart();
}

/* PLAYERS */
function renderPlayers(){

    let arr = Object.values(stats);

    arr.sort((a,b)=>(b.kills*1000+b.damage)-(a.kills*1000+a.damage));

    let html = "";

    arr.forEach((p,i)=>{
        html+=`
        <tr class="${i===0?'mvp':''}">
            <td>${i+1}</td>
            <td>${i===0?'👑 ':''}${p.name}</td>
            <td class="team">${p.team}</td>
            <td>${p.kills}</td>
            <td>${p.damage}</td>
            <td>${i===0?'MVP':'PLAYER'}</td>
        </tr>`;
    });

    document.getElementById("players").innerHTML = html;
}

/* TEAMS */
function renderTeams(){

    let arr = Object.keys(teams)
    .sort((a,b)=>teams[b].t - teams[a].t);

    let html = "";

    arr.forEach((t,i)=>{
        html+=`
        <tr>
            <td>${i+1}</td>
            <td>${t}</td>
            <td>${teams[t].k}</td>
            <td>${teams[t].t}</td>
            <td>${teams[t].b}</td>
        </tr>`;
    });

    document.getElementById("teams").innerHTML = html;
}

/* CHART */
let chart;

function renderChart(){

    let list = Object.values(stats);

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"),{
        type:"bar",
        data:{
            labels:list.map(p=>p.name),
            datasets:[{
                label:"Kills",
                data:list.map(p=>p.kills),
                backgroundColor:"#00d2ff"
            }]
        },
        options:{
            plugins:{legend:{display:false}},
            responsive:true
        }
    });
}

/* 📊 EXPORT EXCEL */
function downloadExcel(){

    let playerData = Object.values(stats).map(p=>({
        Name:p.name,
        Team:p.team,
        Kills:p.kills,
        Damage:p.damage
    }));

    let teamData = Object.keys(teams).map(t=>({
        Team:t,
        Kills:teams[t].k,
        Points:teams[t].t,
        Booyah:teams[t].b
    }));

    let wb = XLSX.utils.book_new();

    let ws1 = XLSX.utils.json_to_sheet(playerData);
    let ws2 = XLSX.utils.json_to_sheet(teamData);

    XLSX.utils.book_append_sheet(wb, ws1, "Players");
    XLSX.utils.book_append_sheet(wb, ws2, "Teams");

    XLSX.writeFile(wb, "SAYAN_ANALYZER.xlsx");
}

</script>

</body>
</html>
