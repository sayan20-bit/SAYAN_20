<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAYAN ESPORTS ANALYZER SYSTEM</title>

<style>
:root{
    --bg1:#070b1a;
    --bg2:#111827;
    --bg3:#1e293b;

    --textColor:#ffffff;

    --accent:#00d2ff;
    --accent2:#7c3aed;

    --glass:rgba(255,255,255,0.05);
    --border:rgba(255,255,255,0.08);
}

/* BODY */
body{
    font-family:Arial, sans-serif;
    background:
    radial-gradient(circle at top left,#00d2ff22,transparent 25%),
    radial-gradient(circle at bottom right,#7c3aed22,transparent 25%),
    linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));

    color:var(--textColor);
    padding:20px;
    min-height:100vh;
}

/* MAIN BOX */
.box{
    background:rgba(255,255,255,0.03);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    border:1px solid var(--border);

    padding:25px;
    border-radius:28px;

    max-width:1250px;
    margin:auto;

    box-shadow:
    0 0 30px rgba(0,210,255,0.08),
    0 0 80px rgba(124,58,237,0.05);
}

/* TITLE */
h1{
    text-align:center;

    font-size:42px;
    font-weight:900;
    letter-spacing:2px;

    margin-bottom:30px;

    background:linear-gradient(90deg,#00d2ff,#7c3aed,#00d2ff);
    background-size:200%;

background-clip:text;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

    animation:titleGlow 6s linear infinite;
}

@keyframes titleGlow{
    0%{background-position:0%;}
    100%{background-position:200%;}
}

/* SUB TITLES */
h2{
    margin-top:20px;
    color:#00d2ff;
    font-size:24px;
}

/* CONTROLS */
.controls{
    display:flex;
    flex-direction:column;
    gap:22px;
    margin-bottom:30px;
}

/* TOP ROW */
.topControls{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

/* CONTROL CARD */
.controlCard{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.07);

    padding:20px;
    border-radius:22px;

    backdrop-filter:blur(10px);

    box-shadow:
    0 0 20px rgba(0,0,0,0.2);

    transition:0.3s;
}

.controlCard:hover{
    transform:translateY(-3px);

    border-color:#00d2ff55;

    box-shadow:
    0 0 25px rgba(0,210,255,0.15);
}

/* CENTER LOGO CARD */
.logoCard{
    max-width:500px;
    width:100%;
    margin:auto;
    text-align:center;
}

/* LABELS */
.controlCard label{
    display:block;

    margin-bottom:15px;

    font-size:18px;
    font-weight:bold;

    color:white;
}

/* COLOR INPUT */
input[type="color"]{
    width:100%;
    height:55px;

    border:none;
    border-radius:16px;

    background:none;
    cursor:pointer;
}

/* FILE INPUT */
input[type="file"]{
    width:100%;

    background:rgba(255,255,255,0.05);

    color:white;

    border:1px solid rgba(255,255,255,0.08);

    border-radius:16px;

    padding:14px;

    font-size:14px;
}

/* FILE BUTTON */
input[type="file"]::file-selector-button{
    background:linear-gradient(135deg,#00d2ff,#7c3aed);

    border:none;

    padding:10px 18px;

    border-radius:12px;

    color:white;
    font-weight:bold;

    cursor:pointer;

    margin-right:12px;
}

/* INPUTS */
input, button{
    padding:12px 15px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    transition:0.25s;
}



/* BUTTONS */
button{
    background:linear-gradient(135deg,#00d2ff,#7c3aed);

    color:white;
    font-weight:bold;
    font-size:15px;

    box-shadow:
    0 5px 20px rgba(0,210,255,0.2);

    transition:0.3s;
}

button:hover{
    transform:translateY(-3px) scale(1.02);

    box-shadow:
    0 10px 30px rgba(0,210,255,0.35);
}

/* TABLE WRAPPER */
.tableWrapper{
    position:relative;
    min-height:300px;
    overflow:hidden;
}

/* WATERMARK */
.watermark{
    position:absolute;
    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    opacity:0.07;

    pointer-events:none;
    z-index:1;

    filter:drop-shadow(0 0 30px #00d2ff55);

    display:flex;
    justify-content:center;
    align-items:center;
}

.watermark img{
    width:60%;
    max-width:900px;
    height:auto;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;

    background:rgba(255,255,255,0.04);

    border:1px solid rgba(255,255,255,0.06);

    backdrop-filter:blur(8px);

    position:relative;
    z-index:2;

    border-radius:18px;
    overflow:hidden;

    box-shadow:
    0 0 25px rgba(0,0,0,0.25);
}

/* TABLE CELLS */
th,td{
    padding:14px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.06);

    color:var(--textColor);
}

/* HEADER */
th{
    background:linear-gradient(135deg,#00d2ff,#7c3aed);

    color:white;
    font-size:15px;
    text-transform:uppercase;
    letter-spacing:1px;
}

/* ROW EFFECT */
tbody tr{
    transition:0.25s;
}

tbody tr:hover{
    background:rgba(255,255,255,0.06);
    transform:scale(1.003);
}

/* MVP */
.mvp{
    background:linear-gradient(90deg,
    rgba(255,215,0,0.10),
    rgba(255,215,0,0.03));
    
    color:gold;
    font-weight:bold;
}

/* CHART */
#chartBox{
    margin-top:35px;

    background:rgba(255,255,255,0.04);

    border:1px solid rgba(255,255,255,0.06);

    padding:20px;

    border-radius:22px;

    backdrop-filter:blur(8px);
}

/* FOOTER */
.footer{
    margin-top:60px;

    padding:35px 20px;

    background:rgba(255,255,255,0.03);

    border-top:1px solid rgba(255,255,255,0.08);

    text-align:center;

    border-radius:25px 25px 0 0;

    backdrop-filter:blur(8px);
}

.footer h3{
    color:var(--accent);
    margin-bottom:18px;
    font-size:28px;
}

/* FOOTER BUTTONS */
.footerLinks{
    margin-bottom:20px;
}

.footerLinks a{
    display:inline-block;

    margin:8px;
    padding:12px 22px;

    border-radius:15px;

    text-decoration:none;

    background:linear-gradient(135deg,#00d2ff,#7c3aed);

    color:white;
    font-weight:bold;

    transition:0.3s;

    box-shadow:
    0 5px 20px rgba(0,210,255,0.18);
}

.footerLinks a:hover{
    transform:translateY(-4px) scale(1.05);

    box-shadow:
    0 10px 30px rgba(0,210,255,0.35);
}

.footer p{
    opacity:0.65;
    font-size:14px;
}

/* BUTTONS ROW */
.buttonsRow{
    display:flex;
    justify-content:space-between;
    align-items:center;

    gap:15px;
    margin-top:20px;
    margin-bottom:10px;

    flex-wrap:wrap;
}

.buttonsRow button{
    flex:1;
    min-width:220px;
}

/* SCROLLBAR */
::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-thumb{
    background:#00d2ff;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="box">

<h1>🔥 SAYAN ESPORTS ANALYZER</h1>

<div class="controls">

<div class="topControls">

<div class="controlCard">
<label>🎨 Background Color</label>
<input type="color" onchange="setBG(this.value)">
</div>

<div class="controlCard">
<label>✍️ Text Color</label>
<input type="color" onchange="setText(this.value)">
</div>

</div>

<div class="controlCard logoCard">
<label>🖼️ Upload Tournament Logo</label>
<input type="file" id="logoInput" accept="image/*">
</div>

</div>

<input type="file" id="files" multiple>

<!-- BUTTONS -->
<div class="buttonsRow">

<button onclick="copyTable('teamsTable')">
📋 Copy Teams Table
</button>

<button onclick="downloadExcel()">
⬇️ Download Excel
</button>

<button onclick="copyTable('playersTable')">
📋 Copy Players Table
</button>

</div>

<!-- TEAMS -->
<div class="section tableWrapper">

<div class="watermark" id="watermark"></div>

<h2>🏆 TEAMS</h2>

<table id="teamsTable">
<thead>
<tr>
<th>Rank</th>
<th>Team</th>
<th>Kills</th>
<th>Points</th>
<th>BOOYAH</th>
</tr>
</thead>
<tbody id="teams"></tbody>
</table>

</div>

<!-- PLAYERS -->
<div class="section">
<h2>👤 PLAYERS</h2>

<table id="playersTable">
<thead>
<tr>
<th>Rank</th>
<th>Name</th>
<th>Team</th>
<th>Kills</th>
<th>Damage</th>
<th>Status</th>
</tr>
</thead>
<tbody id="players"></tbody>
</table>
  
</div>

<!-- CHART -->
<div id="chartBox">
<canvas id="chart"></canvas>
</div>

</div>
 
<h2>🎨 Team Logos</h2>

<table id="logosTable">
<thead>
<tr>
<th>Team</th>
<th>Logo</th>
</tr>
</thead>

<tbody id="logosBody"></tbody>
</table>


<!-- FOOTER -->
<footer class="footer">

<div class="footerContent">

<h3>🔥 SAYAN ESPORTS ANALYZER</h3>

<div class="footerLinks">

<a href="https://instagram.com/yahya_lehrir_officiel" target="_blank">
📸 Instagram
</a>

<a href="https://www.youtube.com/@SAYANYTAMV" target="_blank">
▶️ YouTube
</a>

</div>

<p>
© 2026 SAYAN ESPORTS - ALL RIGHTS RESERVED
</p>

</div>

</footer>

<script>



/* COLORS */
function setBG(c){
document.documentElement.style.setProperty('--bg1',c);
document.documentElement.style.setProperty('--bg2',c);
document.documentElement.style.setProperty('--bg3',c);
}

function setText(c){
document.documentElement.style.setProperty('--textColor',c);
}

/* LOGO */
document.getElementById("logoInput").addEventListener("change",function(e){

const file = e.target.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload = function(){
document.getElementById("watermark").innerHTML =
`<img src="${reader.result}">`;
};

reader.readAsDataURL(file);
});

/* DATA */
let stats = {};
let teams = {};
let chart;
let teamLogos = {};

document.getElementById('files').addEventListener('change', function(e){

const files = e.target.files;
stats = {};
teams = {};

let done = 0;

Array.from(files).forEach(file=>{
const reader = new FileReader();

reader.onload = function(){
parse(reader.result);
done++;
if(done === files.length) render();
};

reader.readAsText(file);
});

});

function getPoints(rank){
return {1:12,2:9,3:8,4:7,5:6,6:5,7:4,8:3,9:2,10:1}[rank] || 0;
}

function parse(text){

let currentTeam = "Unknown";
let lines = text.split("\n");

lines.forEach(line=>{

let teamMatch = line.match(/TeamName:\s*(.*?)(Rank|$)/i);
if(teamMatch) currentTeam = teamMatch[1].trim();

let teamScore = line.match(/TeamName:\s*(.*?)\s+Rank:\s*(\d+)\s+KillScore:\s*(\d+)/);

if(teamScore){
let name = teamScore[1];
let rank = +teamScore[2];
let kills = +teamScore[3];

if(!teams[name]) teams[name]={k:0,p:0,t:0,b:0};

teams[name].k += kills;
teams[name].p += getPoints(rank);
teams[name].t += kills + getPoints(rank);

if(rank === 1) teams[name].b++;
}

let playerMatch = line.match(/NAME:\s*(.*?)\s+ID:\s*(\d+)\s+KILL:\s*(\d+)/i);

if(playerMatch){

let name = playerMatch[1];
let id = playerMatch[2];
let kills = parseInt(playerMatch[3]);

if(!stats[id]){
stats[id]={id,name,team:currentTeam,kills:0,damage:0};
}

stats[id].kills += kills;
stats[id].damage += kills * 200;
}

});

}

function render(){
renderPlayers();
renderTeams();
renderLogosTable();
renderChart();
}
function renderLogosTable(){

let body = "";

Object.keys(teams).forEach(team=>{

body += `
<tr>

<td>${team}</td>

<td>
<input type="file"
accept="image/*"
onchange="uploadTeamLogo(event,'${team}')">
</td>

</tr>
`;

});

document.getElementById("logosBody").innerHTML = body;
}

function uploadTeamLogo(event, team){

const file = event.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(){

teamLogos[team] = reader.result;

renderTeams();

};

reader.readAsDataURL(file);
}

function renderPlayers(){

let arr = Object.values(stats)
.sort((a,b)=>(b.kills*1000+b.damage)-(a.kills*1000+a.damage));

let html="";

arr.forEach((p,i)=>{
html+=`
<tr class="${i===0?'mvp':''}">
<td>${i+1}</td>
<td>${i===0?'👑 ':''}${p.name}</td>
<td>${p.team}</td>
<td>${p.kills}</td>
<td>${p.damage}</td>
<td>${i===0?'MVP':'PLAYER'}</td>
</tr>`;
});

document.getElementById("players").innerHTML=html;
}

function renderTeams(){

let arr = Object.keys(teams)
.sort((a,b)=>teams[b].t - teams[a].t);

let html="";

arr.forEach((t,i)=>{

let logo = teamLogos[t]
? `<img src="${teamLogos[t]}"
style="
width:30px;
height:30px;
border-radius:50%;
object-fit:cover;
vertical-align:middle;
margin-right:8px;
">`
: "";

html+=`
<tr>

<td>${i+1}</td>

<td style="text-align:left;padding-left:15px;">
${logo} ${t}
</td>

<td>${teams[t].k}</td>
<td>${teams[t].t}</td>
<td>${teams[t].b}</td>

</tr>`;
});

document.getElementById("teams").innerHTML=html;
}

function renderChart(){

let list = Object.values(stats);

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:list.map(p=>p.name),
datasets:[{
label:"Kills",
data:list.map(p=>p.kills),
backgroundColor:"#00d2ff"
}]
},
options:{
plugins:{legend:{display:false}},
responsive:true
}
});

}

function downloadExcel(){

let wb = XLSX.utils.book_new();

/* ===== PLAYERS TABLE ===== */
let playersArr = Object.values(stats)
.sort((a,b)=>(b.kills*1000+b.damage)-(a.kills*1000+a.damage))
.map((p,i)=>({
    Rank: i+1,
    Name: p.name,
    Team: p.team,
    Kills: p.kills,
    Damage: p.damage,
    Status: i===0 ? "MVP" : "PLAYER"
}));

let wsPlayers = XLSX.utils.json_to_sheet(playersArr);

/* تحسين عرض الأعمدة */
wsPlayers["!cols"] = [
    { wch: 8 },   // Rank
    { wch: 20 },  // Name
    { wch: 20 },  // Team
    { wch: 10 },  // Kills
    { wch: 12 },  // Damage
    { wch: 10 }   // Status
];

XLSX.utils.book_append_sheet(wb, wsPlayers, "Players");


/* ===== TEAMS TABLE ===== */
let teamsArr = Object.keys(teams)
.sort((a,b)=>teams[b].t - teams[a].t)
.map((t,i)=>({
    Rank: i+1,
    Team: t,
    Kills: teams[t].k,
    Points: teams[t].t,
    BOOYAH: teams[t].b
}));

let wsTeams = XLSX.utils.json_to_sheet(teamsArr);

wsTeams["!cols"] = [
    { wch: 8 },
    { wch: 25 },
    { wch: 10 },
    { wch: 10 },
    { wch: 10 }
];

XLSX.utils.book_append_sheet(wb, wsTeams, "Teams");


/* EXPORT FINAL */
XLSX.writeFile(wb,"SAYAN_ANALYZER.xlsx");
}

/* ===== COPY TABLE ===== */

function copyTable(tableId){

    let table = document.getElementById(tableId);
    let rows = table.querySelectorAll("tr");

    let text = "";

    rows.forEach(row => {

        let cols = row.querySelectorAll("th, td");
        let rowText = [];

        cols.forEach(col => {
            rowText.push(col.innerText);
        });

        text += rowText.join("\t") + "\n";
    });

    navigator.clipboard.writeText(text);

}

/* BUTTONS */
/* 🔒 EXTRA PROTECTION LAYER (DO NOT MODIFY ORIGINAL CODE) */

/* منع الزر اليمين */
document.addEventListener("contextmenu", e => e.preventDefault());

/* منع نسخ + لصق + تحديد */
document.addEventListener("copy", e => e.preventDefault());
document.addEventListener("cut", e => e.preventDefault());
document.addEventListener("paste", e => e.preventDefault());

/* منع فتح DevTools */
document.addEventListener("keydown", function(e){

    if(
        e.key === "F12" ||
        (e.ctrlKey && e.key.toLowerCase() === "u") ||
        (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") ||
        (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j") ||
        (e.ctrlKey && e.key.toLowerCase() === "s")
    ){
        e.preventDefault();
        return false;
    }
});

/* منع تحديد النص (JS backup) */
document.addEventListener("selectstart", e => e.preventDefault());

/* تنظيف الكونسول باش يصعب التتبع */
setInterval(() => {
    console.clear();
}, 1000);

    function resizeLogo(){
    const table = document.querySelector(".tableWrapper table");
    const watermark = document.querySelector(".watermark img");

    if(!table || !watermark) return;

    const rows = table.querySelectorAll("tbody tr").length;

    // الحجم حسب عدد الفرق
    let size = 300 + (rows * 25);

    // limits باش ما يكبرش بزاف
    size = Math.min(size, 900);
    size = Math.max(size, 250);

    watermark.style.width = size + "px";
}

setInterval(resizeLogo, 500);

</script>

</body>
</html>
